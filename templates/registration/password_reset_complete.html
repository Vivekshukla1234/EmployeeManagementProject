{% extends 'base.html' %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="glass-card">
    <h2 class="gradient-title">Password Reset Complete</h2>
    <p class="subtitle" style="margin-bottom: 2rem;">
        Your password has been successfully updated.
    </p>

    <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem;">
        You can now use your new password to sign in.
    </p>

    <a href="{% url 'login' %}" class="back-to-login">Sign In</a>
</div>
{% endblock %}
